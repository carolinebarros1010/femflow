<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FemFlow — Termos de Uso</title>
  <link rel="stylesheet" href="legal.css" />
  <script src="legal.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <div class="header-actions">
        <button id="backBtn" class="btn-back" type="button">← Voltar</button>
      </div>
      <h1 id="brand">FemFlow</h1>
      <h2 id="title">Termos de Uso</h2>
      <div class="meta" id="updated"></div>
      <div class="lang-switch">
        <button data-lang="pt">PT</button><button data-lang="en">EN</button><button data-lang="fr">FR</button>
      </div>
    </header>
    <section class="card" id="content"></section>
    <nav class="nav-links">
      <a id="linkPrivacy" href="privacy.html">Política de Privacidade</a>
      <a id="linkDelete" href="delete-account.html">Excluir conta</a>
    </nav>
  </main>
<script>
const TEXT={pt:{title:"Termos de Uso",body:`<h3>Escopo</h3><p>O FemFlow oferece conteúdos e organização de treino, não substituindo orientação médica, diagnóstica ou terapêutica.</p><h3>Conta e uso</h3><p>Você é responsável pelas informações enviadas, pelo uso seguro da conta e por manter credenciais protegidas.</p><h3>Responsabilidade do usuário</h3><p>Você deve respeitar limites físicos e buscar profissionais de saúde quando necessário.</p><h3>Propriedade intelectual</h3><p>Conteúdos, marcas, textos, layout e programas do FemFlow são protegidos e não podem ser reproduzidos sem autorização.</p><h3>Pagamento e assinatura</h3><p>Assinaturas e pagamentos de recursos digitais podem ser contratados no aplicativo. No iOS, quando aplicável, a cobrança é processada pela Apple e o gerenciamento/cancelamento ocorre pelo Apple ID. O FemFlow não armazena dados completos de cartão.</p><h3>Limitação de responsabilidade</h3><p>Na máxima extensão legal, o FemFlow não responde por danos indiretos, lucros cessantes ou uso inadequado do serviço.</p><h3>Encerramento da conta</h3><p>Podemos encerrar contas por violação destes termos ou obrigação legal. O usuário também pode solicitar exclusão.</p><h3>Lei aplicável e foro</h3><p>Aplicam-se as leis do Brasil. Foro de referência: <strong>Comarca/UF a definir</strong>.</p><h3>Contato</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`},en:{title:"Terms of Use",body:`<h3>Scope</h3><p>FemFlow provides training content and organization tools and does not replace medical advice, diagnosis or treatment.</p><h3>Account and use</h3><p>You are responsible for submitted information, safe account use and credential protection.</p><h3>User responsibility</h3><p>You must respect your physical limits and seek healthcare professionals when needed.</p><h3>Intellectual property</h3><p>FemFlow content, brand, text, layout and programs are protected and cannot be reproduced without authorization.</p><h3>Payments and subscriptions</h3><p>Subscriptions and digital feature payments may be purchased in the app. On iOS, when applicable, billing is processed by Apple and management/cancellation is handled through Apple ID. FemFlow does not store full card details.</p><h3>Liability limitation</h3><p>To the fullest extent permitted by law, FemFlow is not liable for indirect damages, lost profits or improper use.</p><h3>Account termination</h3><p>We may terminate accounts for terms violations or legal duties. Users may request deletion.</p><h3>Applicable law and venue</h3><p>Brazilian law applies. Venue placeholder: <strong>District/State to be defined</strong>.</p><h3>Contact</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`},fr:{title:"Conditions d'utilisation",body:`<h3>Portée</h3><p>FemFlow fournit des contenus et une organisation d'entraînement, sans remplacer un avis médical.</p><h3>Compte et utilisation</h3><p>Vous êtes responsable des données fournies, de l'utilisation sécurisée du compte et de vos identifiants.</p><h3>Responsabilité utilisateur</h3><p>Respectez vos limites physiques et consultez des professionnels de santé si nécessaire.</p><h3>Propriété intellectuelle</h3><p>Les contenus, marques, textes, mise en page et programmes de FemFlow sont protégés.</p><h3>Paiement et abonnement</h3><p>Les abonnements et paiements de fonctionnalités numériques peuvent être souscrits dans l'application. Sur iOS, le cas échéant, la facturation est traitée par Apple et la gestion/résiliation se fait via l'Apple ID. FemFlow ne stocke pas les données complètes de carte.</p><h3>Limitation de responsabilité</h3><p>Dans les limites légales, FemFlow n'est pas responsable des dommages indirects ou d'un usage inadapté.</p><h3>Clôture de compte</h3><p>Nous pouvons clôturer des comptes en cas de violation ou obligation légale. L'utilisateur peut demander la suppression.</p><h3>Loi et juridiction</h3><p>Droit applicable : Brésil. Tribunal de référence : <strong>Ville/État à définir</strong>.</p><h3>Contact</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`}};
function render(lang){
  const t=TEXT[lang]||TEXT.pt;const c=FEMFLOW_LEGAL.copy[lang];
  document.documentElement.lang=lang;title.textContent=t.title;brand.textContent=c.femflow;
  updated.textContent=`${c.lastUpdated}: ${FEMFLOW_LEGAL.LAST_UPDATED}`;content.innerHTML=t.body;
  linkPrivacy.textContent=c.links.privacy;linkDelete.textContent=c.links.del;backBtn.textContent=c.back;
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}
let current=resolveLegalLang();render(current);
backBtn.onclick=()=>backFromLegal(current);
document.querySelectorAll('[data-lang]').forEach(btn=>btn.onclick=()=>{current=btn.dataset.lang;localStorage.setItem('femflow_lang',current);render(current);});
</script>
</body>
</html>
