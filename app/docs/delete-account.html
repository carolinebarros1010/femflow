<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>FemFlow — Excluir conta</title><link rel="stylesheet" href="legal.css"/><script src="legal.js"></script></head><body><main class="container"><header><h1 id="brand">FemFlow</h1><h2 id="title">Excluir conta e dados</h2><div class="meta" id="updated"></div><div class="lang-switch"><button data-lang="pt">PT</button><button data-lang="en">EN</button><button data-lang="fr">FR</button></div></header><section class="card" id="content"></section><nav class="nav-links"><a id="linkPrivacy" href="privacy.html">Política de Privacidade</a><a id="linkTerms" href="terms.html">Termos de Uso</a></nav></main><script>
const TEXT={pt:{title:"Excluir conta e dados",body:`<h3>Como solicitar no app</h3><p>No app FemFlow, abra o menu e toque em <strong>Excluir conta</strong>. Confirme a solicitação para registro.</p><h3>O que é excluído</h3><p>Conta e dados de uso/treino são removidos ou anonimizados conforme política interna.</p><h3>O que pode ser retido</h3><p>Registros mínimos podem ser mantidos por obrigação legal, prevenção de fraude e auditoria.</p><h3>Prazo</h3><p>Processamos solicitações em até 30 dias.</p><h3>Confirmação</h3><p>Você verá confirmação no app e poderá receber retorno por e-mail quando aplicável.</p><h3>Acesso à tela no app</h3><p>Menu → Excluir conta. Se estiver sem login, entre na conta e siga o fluxo.</p><h3>Contato</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`},en:{title:"Delete account and data",body:`<h3>How to request in-app</h3><p>In FemFlow, open the menu and tap <strong>Delete account</strong>. Confirm to register your request.</p><h3>What is deleted</h3><p>Account and training/usage data are removed or anonymized according to internal policy.</p><h3>What may be retained</h3><p>Minimum records may be retained due to legal obligations, fraud prevention and audit.</p><h3>Timeline</h3><p>Requests are processed within up to 30 days.</p><h3>Confirmation</h3><p>You will see an in-app confirmation and may receive email confirmation when applicable.</p><h3>Open in-app screen</h3><p>Menu → Delete account. If logged out, sign in first and follow the flow.</p><h3>Contact</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`},fr:{title:"Supprimer le compte et les données",body:`<h3>Comment demander dans l'app</h3><p>Dans FemFlow, ouvrez le menu et touchez <strong>Supprimer le compte</strong>. Confirmez la demande.</p><h3>Ce qui est supprimé</h3><p>Le compte et les données d'usage/entraînement sont supprimés ou anonymisés.</p><h3>Ce qui peut être conservé</h3><p>Des données minimales peuvent être conservées pour obligations légales, anti-fraude et audit.</p><h3>Délai</h3><p>Traitement sous 30 jours maximum.</p><h3>Confirmation</h3><p>Confirmation dans l'app et éventuellement par e-mail.</p><h3>Accès à l'écran dans l'app</h3><p>Menu → Supprimer le compte. Si vous êtes déconnectée, connectez-vous d'abord.</p><h3>Contact</h3><p><a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>`}};
function render(lang){const t=TEXT[lang]||TEXT.pt;const c=FEMFLOW_LEGAL.copy[lang];document.documentElement.lang=lang;title.textContent=t.title;brand.textContent=c.femflow;updated.textContent=`${c.lastUpdated}: ${FEMFLOW_LEGAL.LAST_UPDATED}`;content.innerHTML=t.body;linkPrivacy.textContent=c.links.privacy;linkTerms.textContent=c.links.terms;document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));}
let current=resolveLegalLang();render(current);document.querySelectorAll('[data-lang]').forEach(btn=>btn.onclick=()=>{current=btn.dataset.lang;localStorage.setItem('femflow_lang',current);render(current);});
</script></body></html>
