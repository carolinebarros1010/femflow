<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FemFlow — Política de Privacidade</title>
  <link rel="stylesheet" href="legal.css" />
  <script src="legal.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <div class="header-actions">
        <button id="backBtn" class="btn-back" type="button">← Voltar</button>
      </div>
      <h1 id="brand">FemFlow</h1>
      <h2 id="title">Política de Privacidade</h2>
      <div class="meta" id="updated"></div>
      <div class="lang-switch">
        <button data-lang="pt">PT</button><button data-lang="en">EN</button><button data-lang="fr">FR</button>
      </div>
    </header>
    <section class="card" id="content"></section>
    <nav class="nav-links">
      <a id="linkTerms" href="terms.html">Termos de Uso</a>
      <a id="linkDelete" href="delete-account.html">Excluir conta</a>
    </nav>
  </main>
<script>
const TEXT = {
  pt: { title:"Política de Privacidade", body:`<p><strong>Controladora:</strong> FemFlow.</p><h3>Dados coletados</h3><ul><li>Conta: nome, e-mail, identificadores da conta e telefone <strong>opcional</strong> (quando informado no cadastro/anamnese).</li><li>Uso: eventos de navegação, progresso e telas acessadas.</li><li>Treino e saúde: anamnese, ciclo, fase hormonal e registros de treino/descanso.</li><li>Dispositivo/sessão: deviceId, sessão ativa, IP e user-agent quando disponível.</li></ul><h3>Finalidades</h3><ul><li>Operar o serviço e personalizar treinos para a sua evolução no app.</li><li>Suporte e atendimento.</li><li>Segurança, prevenção de fraude e compliance.</li></ul><p>Usamos seus dados para a evolução da sua experiência e desempenho no FemFlow, sem uso para venda de dados.</p><h3>Base legal</h3><p>Tratamos dados com base na execução de contrato e, quando aplicável, consentimento.</p><h3>Compartilhamento</h3><p>Não compartilhamos seus dados pessoais com terceiros para fins comerciais. Podemos usar operadores essenciais (como Google/Firebase e processadores de pagamento aplicáveis) para autenticação, infraestrutura e processamento de assinatura dentro do app.</p><h3>Retenção</h3><ul><li>Conta e dados principais: enquanto a conta estiver ativa.</li><li>Logs técnicos: até 90 dias.</li><li>Pedidos de exclusão: processados em até 30 dias.</li></ul><h3>Segurança</h3><p>Adotamos armazenamento seguro e controles técnicos e organizacionais para reduzir acesso indevido.</p><h3>Direitos do usuário</h3><p>Você pode solicitar acesso, correção e exclusão de dados.</p><h3>Crianças e adolescentes</h3><p>O FemFlow não é direcionado a menores de 18 anos.</p><h3>Alterações</h3><p>Podemos atualizar esta política periodicamente.</p><h3>Contato</h3><p>Contato de Privacidade: <a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>` },
  en: { title:"Privacy Policy", body:`<p><strong>Controller:</strong> FemFlow.</p><h3>Data we collect</h3><ul><li>Account: name, email, account identifiers, and <strong>optional</strong> phone number (if provided during signup/intake form).</li><li>Usage: navigation events, progress and visited screens.</li><li>Training and health: intake form, cycle, hormonal phase and workout/rest logs.</li><li>Device/session: deviceId, active session, IP and user-agent when available.</li></ul><h3>Purposes</h3><ul><li>Provide the service and personalize training for your progress in the app.</li><li>Support and customer care.</li><li>Security, fraud prevention and compliance.</li></ul><p>Your data is used to improve your FemFlow experience and evolution, and not for data resale.</p><h3>Legal basis</h3><p>We process data based on contract performance and, where required, consent.</p><h3>Sharing</h3><p>We do not share your personal data with third parties for commercial purposes. We may use essential processors (such as Google/Firebase and applicable payment processors) for authentication, infrastructure, and in-app subscription processing.</p><h3>Retention</h3><ul><li>Main account data: while your account is active.</li><li>Technical logs: up to 90 days.</li><li>Deletion requests: processed within up to 30 days.</li></ul><h3>Security</h3><p>We apply secure storage and technical/organizational safeguards to reduce unauthorized access.</p><h3>User rights</h3><p>You may request access, correction and deletion of your data.</p><h3>Children</h3><p>FemFlow is not intended for users under 18.</p><h3>Changes</h3><p>This policy may be updated from time to time.</p><h3>Contact</h3><p>Privacy Contact: <a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>` },
  fr: { title:"Politique de confidentialité", body:`<p><strong>Responsable:</strong> FemFlow.</p><h3>Données collectées</h3><ul><li>Compte : nom, e-mail, identifiants et téléphone <strong>optionnel</strong> (si renseigné lors de l'inscription/anamnèse).</li><li>Usage : événements de navigation, progression et écrans visités.</li><li>Entraînement et santé : anamnèse, cycle, phase hormonale et journaux.</li><li>Appareil/session : deviceId, session active, IP et user-agent si disponible.</li></ul><h3>Finalités</h3><ul><li>Fournir le service et personnaliser l'entraînement pour votre progression dans l'app.</li><li>Support utilisateur.</li><li>Sécurité, prévention de fraude et conformité.</li></ul><p>Vos données sont utilisées pour faire évoluer votre expérience FemFlow, sans revente de données.</p><h3>Base légale</h3><p>Traitement basé sur l'exécution du contrat et, si applicable, le consentement.</p><h3>Partage</h3><p>Nous ne partageons pas vos données personnelles avec des tiers à des fins commerciales. Nous utilisons uniquement des sous-traitants essentiels (Google/Firebase et des processeurs de paiement applicables) pour l'authentification, l'infrastructure et le traitement des abonnements dans l'application.</p><h3>Conservation</h3><ul><li>Données de compte : tant que le compte est actif.</li><li>Logs techniques : jusqu'à 90 jours.</li><li>Demandes de suppression : jusqu'à 30 jours.</li></ul><h3>Sécurité</h3><p>Nous appliquons un stockage sécurisé et des mesures techniques/organisationnelles adaptées.</p><h3>Droits</h3><p>Vous pouvez demander l'accès, la rectification et la suppression de vos données.</p><h3>Mineurs</h3><p>FemFlow n'est pas destiné aux moins de 18 ans.</p><h3>Modifications</h3><p>Cette politique peut être mise à jour.</p><h3>Contact</h3><p>Contact confidentialité : <a href="mailto:${FEMFLOW_LEGAL.SUPPORT_EMAIL}">${FEMFLOW_LEGAL.SUPPORT_EMAIL}</a></p>` }
};
function render(lang){
  const t=TEXT[lang]||TEXT.pt;const c=FEMFLOW_LEGAL.copy[lang];
  document.documentElement.lang=lang;title.textContent=t.title;brand.textContent=c.femflow;
  updated.textContent=`${c.lastUpdated}: ${FEMFLOW_LEGAL.LAST_UPDATED}`;content.innerHTML=t.body;
  linkTerms.textContent=c.links.terms;linkDelete.textContent=c.links.del;backBtn.textContent=c.back;
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}
let current=resolveLegalLang();render(current);backBtn.onclick=()=>backFromLegal(current);document.querySelectorAll('[data-lang]').forEach(btn=>btn.onclick=()=>{current=btn.dataset.lang;localStorage.setItem('femflow_lang',current);render(current);});
</script>
</body>
</html>
