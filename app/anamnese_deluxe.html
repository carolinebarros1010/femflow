<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <script src="./config/config.js" defer></script>
  <title>FemFlow • Anamnese Deluxe</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.ico">
  <meta name="theme-color" content="#cc6a5a">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- Core disabled (somente backend/infra) -->
  <script>window.FEMFLOW_DISABLE_UI = true;</script>

  <!-- Styles internas -->
  <style>
    :root {
      --terracota:#cc6a5a; 
      --bege:#fff5ef; 
      --verde:#335953; 
      --texto:#5b4f49;
    }
    body{
      margin:0; min-height:100vh;
      display:flex; flex-direction:column; align-items:center;
      background:linear-gradient(180deg,var(--bege) 0%,#fae6dc 100%);
      color:var(--texto);
      font-family:"Lato",sans-serif; overflow-x:hidden;
    }
    h1{
      font-family:'Playfair Display',serif;
      color:var(--terracota);
      font-size:2rem; margin:1rem 0 .4rem;
    }
    #btnLang{
      background:none; border:none; color:var(--verde);
      font-size:.9rem; font-weight:600; cursor:pointer;
      margin-top:-10px; margin-bottom:8px;
    }
    .card{
      background:#fff; border-radius:24px;
      max-width:420px; width:90%;
      padding:26px 22px; margin-top:1.2rem;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      text-align:center; animation:fadeIn .5s ease;
    }
    input{
      width:78%; max-width:300px;
      padding:.85rem 1rem; margin:.4rem 0 1rem;
      border:1px solid #e6ddd8; border-radius:14px;
      font-size:.95rem; background:#fff;
      transition:border-color .2s, box-shadow .2s;
    }
    input:focus{ border-color:var(--terracota); box-shadow:0 0 0 3px rgba(204,106,90,.18) }
    input[aria-invalid="true"]{ border-color:#d9534f }
    label{
      display:block;
      margin:0.4rem auto -0.4rem;
      width:78%; max-width:300px;
      text-align:left;
      font-size:.85rem;
      color:var(--texto);
    }
    .err{ font-size:.9rem; color:#d9534f; min-height:1.1rem; }
   button{
  background:linear-gradient(135deg,var(--verde),var(--terracota));
  color:#fff; border:none; border-radius:14px;
  padding:12px 18px; font-size:1rem;
  width:100%;               /* 🔥 ocupa o container */
  max-width:300px;
  cursor:pointer; transition:.25s;
}

    button[disabled]{opacity:.6; cursor:not-allowed;}
    button:hover:not([disabled]){ transform:translateY(-2px); }

    .gif{
      width:180px; height:180px; object-fit:cover;
      border-radius:20px; margin:1rem auto;
      box-shadow:0 5px 15px rgba(0,0,0,.1);
    }

    .question{ font-size:1.1rem; font-weight:600; margin:1.2rem 0; }
    .options{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  width:100%;
}



    .hidden{ display:none!important }

    .ff-lang-modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index:2147483001;
    }

    .ff-lang-modal.ff-open{
      display:flex;
    }

    .ff-lang-box{
      background:#fff;
      padding:24px;
      border-radius:18px;
      width:min(320px,90%);
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:12px;
      box-shadow:0 16px 40px rgba(0,0,0,.2);
    }

    .ff-lang-box h3{
      margin:0 0 8px;
      color:var(--verde);
      font-family:'Playfair Display',serif;
    }

    .ff-lang-box .ff-lang-btn,
    .ff-lang-box .ff-lang-close{
      width:100%;
      max-width:none;
      margin:0;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>

  <!-- Pré-load logo -->
  <link rel="preload" href="./assets/logofemflowterracota.png" as="image">
</head>

<body>

  <!-- Logo -->
  <img src="./assets/logofemflowterracota.png" alt="FemFlow" style="width:120px;margin-top:10px;">

  <!-- Título multilíngue -->
  <h1 id="tituloAnamnese">Anamnese</h1>
  <button id="btnLang">Idioma</button>

  <!-- ============================
        ETAPA 1 — CADASTRO
  ============================ -->
  <div id="cadastro" class="card">
    <p id="cadHint" class="hint">🌸 Preencha seus dados para começar:</p>

    <input id="nome" placeholder="Nome completo">
    <div id="eNome" class="err"></div>

    <input id="email" type="email" placeholder="E-mail">
    <div id="eEmail" class="err"></div>

    <input id="telefone" type="tel" placeholder="Telefone (opcional)">
    <div id="eTel" class="err"></div>

    <label id="labelDataNascimento" for="dataNascimento">Data de nascimento</label>
    <input id="dataNascimento" type="date" required>
    <div id="eDataNascimento" class="err"></div>

    <input id="senha" type="password" placeholder="Crie uma senha (mín. 6)">
    <div id="eSenha" class="err"></div>

    <input id="confirma" type="password" placeholder="Confirme a senha">
    <div id="eConf" class="err"></div>

    <button id="btnIniciar" disabled>Iniciar Anamnese</button>
  </div>

  <!-- ============================
        ETAPA 2 — QUIZ
  ============================ -->
  <div id="quiz" class="card hidden">
    <img id="gif" class="gif" src="./assets/gifs/profile_form.webp">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
  </div>

  <!-- ============================
        ETAPA 3 — FINAL
  ============================ -->
  <div id="final" class="card hidden">
    <img class="gif" src="./assets/gifs/success_flow.webp">
    <p id="final-msg">✨ Análise concluída! Calculando seu perfil...</p>
  </div>

  <!-- ============================
        SCRIPTS (todos externos)
  ============================ -->
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="services/firebase-init.js?v=20250127"></script>
  <script defer src="core/femflow-core.js"></script>
  <script src="js/anamnese.js" defer></script>
  <script src="js/anamnese_lang.js" defer></script>

  <!-- Modal de Idioma -->
  <div id="ff-lang-modal" class="ff-lang-modal">
    <div class="ff-lang-box">
      <h3>Selecione o idioma</h3>

      <button data-lang="pt" class="ff-lang-btn">Português</button>
      <button data-lang="en" class="ff-lang-btn">English</button>
      <button data-lang="fr" class="ff-lang-btn">Français</button>

      <button id="ff-lang-close" class="ff-lang-close">Fechar</button>
    </div>
  </div>

  <script src="js/env.js" defer></script>
</body>
</html>
